<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>File Upload</title>
</head>
<body>
    <h2>Загрузка файла (Максимум 1 МБ)</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="myfile" required>
        <br><br>
        <button type="submit">Загрузить</button>
    </form>
</body>
</html>
