{% extends 'shopapp/base.html' %}
{% block title %}Update Order{% endblock %}
{% block body %}
  <h1>Update Order</h1>
  <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Update</button>
  </form>
  <a href="{% url 'shopapp:orders_list' %}">Cancel</a>
{% endblock %}
