{% extends 'shopapp/base.html' %}
{% block title %}Create Product{% endblock %}
{% block body %}
  <h1>Create Product</h1>
  <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Save</button>
  </form>
  <a href="{% url 'shopapp:products_list' %}">Cancel</a>
{% endblock %}
